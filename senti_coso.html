<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posso Sentire COSO?</title>
<style>
    :root {
        --bg1: #04131f;
        --bg2: #0d2f4a;
        --bg3: #12395d;
        --accent: #ff9d00;
        --accent-2: #ff3d5a;
        --mint: #59ffd4;
        --card: rgba(5, 12, 23, 0.7);
        --text: #f8fbff;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px 14px 40px;
        color: var(--text);
        font-family: "Franklin Gothic Medium", "Trebuchet MS", sans-serif;
        background:
            radial-gradient(circle at 15% 20%, rgba(89, 255, 212, 0.15), transparent 30%),
            radial-gradient(circle at 80% 25%, rgba(255, 157, 0, 0.2), transparent 35%),
            linear-gradient(145deg, var(--bg1), var(--bg2), var(--bg3));
        overflow-x: hidden;
    }

    #fireworks {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 3;
    }

    .app {
        width: min(760px, 100%);
        text-align: center;
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 24px;
        backdrop-filter: blur(8px);
        padding: 24px 14px 30px;
        box-shadow: 0 16px 45px rgba(0, 0, 0, 0.4);
        position: relative;
        z-index: 5;
    }

    h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        letter-spacing: 1px;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
    }

    .subtitle {
        margin: 8px 0 20px;
        opacity: 0.85;
        font-size: 1rem;
    }

    .slot-container {
        display: flex;
        justify-content: center;
        gap: 14px;
        margin: 12px 0 20px;
        flex-wrap: wrap;
    }

    .reel {
        width: 140px;
        height: 140px;
        border-radius: 20px;
        border: 2px solid rgba(255, 255, 255, 0.35);
        display: grid;
        place-items: center;
        font-size: 2rem;
        font-weight: 900;
        color: #fff;
        background:
            radial-gradient(circle at 20% 20%, rgba(89, 255, 212, 0.35), transparent 45%),
            linear-gradient(180deg, #15293b, #06111e);
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.55), 0 10px 24px rgba(0, 0, 0, 0.35);
        transform-origin: center;
    }

    .reel.spinning {
        animation: bounce-spin 0.42s linear infinite;
    }

    @keyframes bounce-spin {
        0% { transform: translateY(-8px) scale(1.02); }
        50% { transform: translateY(8px) scale(0.98); }
        100% { transform: translateY(-8px) scale(1.02); }
    }

    .controls {
        margin-top: 8px;
    }

    button {
        padding: 14px 28px;
        border: 0;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 800;
        letter-spacing: 0.8px;
        cursor: pointer;
        color: #1e1500;
        background: linear-gradient(90deg, #ffc21f, #ff9d00);
        box-shadow: 0 8px 16px rgba(255, 157, 0, 0.45);
        transition: transform 0.2s, filter 0.2s, box-shadow 0.2s;
    }

    button:hover:not(:disabled) {
        transform: translateY(-2px) scale(1.03);
        filter: saturate(1.2);
    }

    button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
    }

    .result {
        margin-top: 22px;
        min-height: 54px;
        font-size: clamp(1.2rem, 3.5vw, 2rem);
        font-weight: 900;
        letter-spacing: 0.6px;
        display: grid;
        place-items: center;
        text-wrap: balance;
    }

    .result.flash {
        animation: pulse 0.35s 4 alternate;
    }

    .result.jackpot {
        color: #ffe16e;
        text-shadow: 0 0 10px #ff9d00, 0 0 30px rgba(255, 157, 0, 0.9);
        animation: title-glow 1s infinite alternate;
    }

    .result.nope {
        color: #ffc5d0;
        text-shadow: 0 0 10px rgba(255, 61, 90, 0.9);
    }

    .result.maybe {
        color: #9fffe8;
        text-shadow: 0 0 10px rgba(89, 255, 212, 0.95);
    }

    @keyframes title-glow {
        from { transform: scale(1); }
        to { transform: scale(1.04); }
    }

    @keyframes pulse {
        from { transform: scale(1); opacity: 0.75; }
        to { transform: scale(1.04); opacity: 1; }
    }

    .confetti {
        position: fixed;
        top: -14px;
        width: 8px;
        height: 14px;
        opacity: 0.95;
        z-index: 4;
        pointer-events: none;
        animation: fall 1.9s linear forwards;
    }

    @keyframes fall {
        to {
            transform: translateY(110vh) rotate(720deg);
            opacity: 0;
        }
    }

    body.win {
        animation: victory-bg 0.7s ease-in-out 2;
    }

    @keyframes victory-bg {
        0% { filter: saturate(1); }
        50% { filter: saturate(1.55) brightness(1.12); }
        100% { filter: saturate(1); }
    }

    @media (max-width: 520px) {
        .reel {
            width: 100px;
            height: 100px;
            font-size: 1.5rem;
        }
    }
</style>
</head>
<body>
<canvas id="fireworks"></canvas>

<main class="app">
    <h1>Posso sentire COSO?</h1>
    <p class="subtitle">La slot definitiva decide il tuo destino musicale.</p>

    <div class="slot-container">
        <div class="reel" id="r1">?</div>
        <div class="reel" id="r2">?</div>
        <div class="reel" id="r3">?</div>
    </div>

    <div class="controls">
        <button id="spinBtn" type="button">GIRA I RULLI</button>
    </div>

    <div class="result" id="result"></div>
</main>

<script>
const values = ["SI", "NO", "FORSE"];
const reels = [
    document.getElementById("r1"),
    document.getElementById("r2"),
    document.getElementById("r3")
];
const resultDiv = document.getElementById("result");
const spinBtn = document.getElementById("spinBtn");

const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
let particles = [];
let animationRunning = false;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function randomValue() {
    return values[Math.floor(Math.random() * values.length)];
}

function spin() {
    spinBtn.disabled = true;
    resultDiv.className = "result";
    resultDiv.textContent = "";

    const intervals = [];
    const finalValues = [];

    reels.forEach((reel, index) => {
        reel.classList.add("spinning");
        intervals[index] = setInterval(() => {
            reel.textContent = randomValue();
        }, 85);

        const stopDelay = 1200 + (index * 450);
        setTimeout(() => {
            clearInterval(intervals[index]);
            const value = randomValue();
            reel.textContent = value;
            reel.classList.remove("spinning");
            finalValues[index] = value;

            if (finalValues.filter(Boolean).length === reels.length) {
                evaluate(finalValues);
                spinBtn.disabled = false;
            }
        }, stopDelay);
    });
}

function evaluate(results) {
    const [a, b, c] = results;
    resultDiv.classList.add("flash");

    if (a === "SI" && b === "SI" && c === "SI") {
        resultDiv.textContent = "JACKPOT! SENTI COSO!";
        resultDiv.className = "result jackpot";
        celebrateWin();
    } else if (a === "NO" && b === "NO" && c === "NO") {
        resultDiv.textContent = "JACKPOT NEGATIVO! Oggi no.";
        resultDiv.className = "result nope";
    } else if (results.includes("FORSE") && results.includes("SI")) {
        resultDiv.textContent = "FORSE... ma molto tendente al SI!";
        resultDiv.className = "result maybe";
    } else {
        resultDiv.textContent = "Riprova, il destino e' capriccioso.";
        resultDiv.className = "result";
    }
}

function celebrateWin() {
    document.body.classList.add("win");
    setTimeout(() => document.body.classList.remove("win"), 1600);
    throwConfetti();
    launchFireworks(2500);
}

function throwConfetti() {
    const colors = ["#ffcb3a", "#ff4d6d", "#7afcff", "#59ffd4", "#ffffff"];

    for (let i = 0; i < 130; i += 1) {
        const piece = document.createElement("span");
        piece.className = "confetti";
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = `${Math.random() * 0.45}s`;
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 2200);
    }
}

function launchFireworks(durationMs) {
    const interval = setInterval(() => {
        spawnExplosion(
            Math.random() * canvas.width,
            (Math.random() * canvas.height * 0.6) + 40
        );
    }, 260);

    setTimeout(() => clearInterval(interval), durationMs);
    if (!animationRunning) {
        animationRunning = true;
        requestAnimationFrame(animateFireworks);
    }
}

function spawnExplosion(x, y) {
    const colors = ["#ffcc00", "#ff6f91", "#7afcff", "#ffffff", "#8effa0"];
    const count = 36 + Math.floor(Math.random() * 20);

    for (let i = 0; i < count; i += 1) {
        const angle = (Math.PI * 2 * i) / count;
        const speed = 1.8 + Math.random() * 3.6;
        particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 65 + Math.random() * 25,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: 1.8 + Math.random() * 2.8
        });
    }
}

function animateFireworks() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.18)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.03;
        p.life -= 1;
        ctx.globalAlpha = Math.max(p.life / 90, 0);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    particles = particles.filter((p) => p.life > 0);
    ctx.globalAlpha = 1;

    if (particles.length > 0) {
        requestAnimationFrame(animateFireworks);
    } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        animationRunning = false;
    }
}

spinBtn.addEventListener("click", spin);
</script>
</body>
</html>
