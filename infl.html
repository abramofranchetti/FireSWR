<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inflazione Media in Italia</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.0.2"></script>
    <script src="js/inlf.js" defer></script>
    <style>
        .inflation-page {
            overflow-x: hidden;
        }

        .inflation-card {
            width: min(100%, 1600px);
        }

        .inflation-chart-container {
            height: 620px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .inflation-chart-frame {
            position: relative;
            min-width: 980px;
            height: 100%;
        }

        .inflation-chart-frame canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        #cumulativeInflation {
            white-space: pre-line;
            overflow-wrap: anywhere;
        }

        @media (max-width: 768px) {
            .inflation-card {
                margin: 0;
                padding: 14px !important;
                border-radius: 0 !important;
                box-shadow: none !important;
            }

            .home-button {
                float: none;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 12px;
            }

            .inflation-page h1 {
                font-size: 1.45rem;
                line-height: 1.25;
            }

            .inflation-page h5 {
                font-size: 1rem;
            }

            .inflation-chart-container {
                height: 520px !important;
                padding: 8px;
                margin-left: -8px;
                margin-right: -8px;
                border-radius: 8px;
            }

            .inflation-chart-frame {
                min-width: 920px;
            }
        }

        @media (max-width: 480px) {
            .inflation-chart-container {
                height: 500px !important;
            }

            .inflation-chart-frame {
                min-width: 860px;
            }
        }
    </style>
</head>

<body class="bg-light inflation-page">
    <div class="container mt-5 p-4 bg-white rounded shadow-sm inflation-card">
        <div class="text-center mb-4">
            <a href="/FireSWR" class="home-button">Home</a>
        </div>
        <h1 class="text-center">Inflazione Media in Italia</h1>
        <h5 class="text-center">Dati storici annuali</h5>

        <div class="chart-container inflation-chart-container mb-4">
            <div class="inflation-chart-frame">
                <canvas id="inflationChart"></canvas>
            </div>
        </div>
        <div class="text-center">
            <button id="resetZoom" class="btn btn-primary">Reset Zoom</button>
        </div>
        <div class="text-center mt-3">
            <p id="cumulativeInflation" class="font-weight-bold">Clicca sui punti del grafico per visualizzare
                l'inflazione cumulata tra due punti</p>
        </div>
        <!-- Disclaimer -->
        <div id="disclaimer-container"></div>
    </div>



    <script>
        document.addEventListener('DOMContentLoaded', function () {
            fetch('html/disclaimer.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('disclaimer-container').innerHTML = data;
                });
        });
    </script>
</body>

</html>
